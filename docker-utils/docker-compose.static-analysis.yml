name: plurist-static-analysis

services:
  sonarqube-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: sonar
      POSTGRES_PASSWORD: sonar # pragma: allowlist secret
      POSTGRES_DB: sonarqube
    volumes:
      - sonarqube_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sonar -d sonarqube"]
      interval: 10s
      timeout: 5s
      retries: 10

  sonarqube:
    image: sonarqube:latest
    depends_on:
      sonarqube-db:
        condition: service_healthy
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://sonarqube-db:5432/sonarqube
      SONAR_JDBC_USERNAME: sonar
      SONAR_JDBC_PASSWORD: sonar # pragma: allowlist secret
    ports:
      - "9002:9000"
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS http://127.0.0.1:9000/api/system/status >/dev/null || exit 1",
        ]
      interval: 20s
      timeout: 10s
      retries: 15

  sonarscanner:
    image: sonarsource/sonar-scanner-cli:latest
    platform: linux/amd64
    profiles: ["scan"]
    depends_on:
      sonarqube:
        condition: service_healthy
    environment:
      SONAR_HOST_URL: http://sonarqube:9000
      SONAR_TOKEN: ${SONAR_TOKEN:-}
    working_dir: /workspace
    volumes:
      - ../:/workspace
      - sonarscanner_cache:/opt/sonar-scanner/.sonar/cache
    command:
      [
        "sh",
        "-lc",
        "test -n \"$$SONAR_TOKEN\" || { printf 'Definí SONAR_TOKEN antes de correr SonarScanner.\\n'; exit 1; }; sonar-scanner -Dsonar.host.url=$$SONAR_HOST_URL -Dsonar.token=$$SONAR_TOKEN",
      ]

  semgrep:
    image: semgrep/semgrep:latest
    profiles: ["scan"]
    working_dir: /src
    volumes:
      - ../:/src
      - ../ops/static-analysis/reports:/reports
    command:
      [
        "semgrep",
        "scan",
        "--config",
        "auto",
        "--exclude",
        "backend/.venv",
        "--exclude",
        "frontend/node_modules",
        "--exclude",
        "frontend/dist",
        "--exclude",
        "tmp_repos",
        "--exclude",
        ".omx",
        "--exclude",
        ".codex",
        "--exclude",
        ".claude",
        "--exclude",
        ".sisyphus",
        "--exclude",
        "ops/static-analysis/reports",
        "--json",
        "--output",
        "/reports/semgrep-report.json",
      ]

volumes:
  sonarqube_db_data:
  sonarqube_data:
  sonarqube_extensions:
  sonarqube_logs:
  sonarscanner_cache:
