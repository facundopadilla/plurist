name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  license-review:
    name: License Review Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check license reviews
        run: ./scripts/check-license-reviews.sh

  backend-audit:
    name: Backend audit & architecture
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: backend/uv.lock

      - name: Copy .env
        run: cp .env.example .env

      - name: Sync backend (dev)
        working-directory: backend
        run: uv sync --extra dev

      - name: pip-audit (known CVEs in locked deps)
        working-directory: backend
        run: uv run pip-audit

      - name: import-linter (architectural boundaries)
        working-directory: backend
        env:
          PYTHONPATH: .
        run: uv run lint-imports

      - name: Django system check
        working-directory: backend
        env:
          DJANGO_SETTINGS_MODULE: config.settings.test
          PYTHONPATH: .
        run: uv run python manage.py check

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Copy .env
        run: cp .env.example .env

      - name: Build images
        run: docker compose build backend frontend

      - name: Run lint
        run: make lint

  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Copy .env
        run: cp .env.example .env

      - name: Start dependencies
        run: docker compose up -d postgres redis minio

      - name: Build backend
        run: docker compose build backend

      - name: Run backend tests
        run: make test-backend

  test-frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Copy .env
        run: cp .env.example .env

      - name: Build frontend
        run: docker compose build frontend

      - name: Run frontend tests
        run: make test-frontend
