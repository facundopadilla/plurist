sonar.projectKey=plurist
sonar.projectName=Plurist
sonar.projectVersion=0.1.0
sonar.sourceEncoding=UTF-8

# Only product code is analyzed as source. Tests are declared separately below.
sonar.sources=backend/apps,backend/config,frontend/src
sonar.tests=backend/tests,frontend/src/__tests__

sonar.python.version=3.12

# Exclude local tooling, generated output, vendored deps, and scratch repos.
sonar.exclusions=backend/.venv/**,backend/**/migrations/**,frontend/node_modules/**,frontend/dist/**,tmp_repos/**,.omx/**,.codex/**,.claude/**,.sisyphus/**,ops/static-analysis/reports/**
sonar.test.inclusions=backend/tests/**,frontend/src/__tests__/**

# Coverage reports generated on the host before running SonarScanner.
sonar.python.coverage.reportPaths=backend/coverage.xml
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info

# Restrict TS config discovery so Sonar does not traverse tmp_repos/**.
sonar.typescript.tsconfigPaths=frontend/tsconfig.json,frontend/tsconfig.node.json
